    <line x1="-120" y1="0" x2="120" y2="0" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="12" fill="#FFFFFF"/>
    <!-- Map pin -->
    <path d="M0,-50 C30,-50 50,-25 50,0 C50,30 0,70 0,70 C0,70 -50,30 -50,0 C-50,-25 -30,-50 0,-50Z" fill="none" stroke="#F1C40F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="-5" r="15" fill="#F1C40F"/>
